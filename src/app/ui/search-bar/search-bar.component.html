<mat-form-field appearance="outline">
    <mat-icon matPrefix>search</mat-icon>
    @if (query().trim()) {
        <button mat-icon-button matSuffix class="me-1" (click)="clear()">
            <mat-icon>close</mat-icon>
        </button>
    }
    <input type="text" matInput placeholder="Search someone"
           [(ngModel)]="query"
    >
</mat-form-field>
