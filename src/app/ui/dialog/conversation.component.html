<app-avatar-container [presence]="displayPresence()" [avatar]="roomAvatar()" [chatId]="identifier()"
                      [size]="45"/>
<div class="middle">
    <span class="room-name" [style.font-weight]="nameWeight()">{{ roomName() }}</span>
    <span class="message"
          [style.font-weight]="contentWeight()">{{ preview() }}</span>
</div>
@if (mine()) {
    <div class="seen-div">
        @for (seen of displaySeenBy(); track seen.id) {
            <img class="seen mt-2" [src]="seen.avatar"
                 alt="">
        }
    </div>
}
