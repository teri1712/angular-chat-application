<img [src]="imageState.image.uri"
     [attr.alt]="imageState.image.filename || 'image'"
     [ngStyle]="{
    'width': imageState.image.width ? imageState.image.width + 'px' : 'auto',
    'height': imageState.image.height ? imageState.image.height + 'px' : 'auto'
}"
     (click)="openImage()"
     style="cursor: zoom-in; border-radius: 6px;">
