@if (results.isLoading()) {
    <div class="d-flex justify-content-center">
        <mat-progress-spinner class="loading-container mat-body-2" mode="indeterminate"
                              diameter="30">
        </mat-progress-spinner>
    </div>
} @else {
    @for (user of results.value(); track user.id) {
        <app-search-user [user]="user" (selected)="clear()"/>
    }
}
