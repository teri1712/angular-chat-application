<div class="avatar"
     [matBadgeHidden]="showBadge()"
     [matBadge]="timeStatus() ? timeStatus() + 'm' : 'o'"
     [ngStyle]="{
        'fontSize': timeStatus() ? '0.6rem' : '0rem'
     }"
     matBadgePosition="below after"
>
    <img [ngSrc]="avatar()?? 'https://i.pinimg.com/webp/1200x/e7/70/51/e77051136cf95616fcb83bbd3f338c93.webp'" alt=""
         [width]="size()" [height]="size()">
</div>
