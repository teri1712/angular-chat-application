<cdk-virtual-scroll-viewport #viewport itemSize="100"
                             style="height: 100%; width: 100%;"
                             (scrolledIndexChange)="onScrollChanged($event)"
>

    <div *cdkVirtualFor="let item of conversationRows(); trackBy: trackBy">
        @switch (item.type) {
            @case ('loading') {
                <div class="loading">
                    <mat-spinner [diameter]="25"></mat-spinner>
                </div>
            }
            @case ('conversation') {
                <app-conversation
                        [identifier]="item.conversation.chatId"
                        [roomName]="item.conversation.roomName"
                        [roomAvatar]="item.conversation.roomAvatar"
                        [newest]="item.conversation.newest"
                        [initialPresence]="item.conversation.presence"
                />
            }
        }
    </div>
</cdk-virtual-scroll-viewport>
