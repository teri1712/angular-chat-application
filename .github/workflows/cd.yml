name: Angular Chat Application CI with Maven

on:
  push:
    branches: [ master ]

jobs:
  build-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build local image
        run: docker build -t teri1712/chat-app-client .

      - name: Build production image
        run: |
          docker build \
          -t teri1712/chat-app-client-production . \
          --build-arg API_URL=${{ secrets.API_URL }} \
          --build-arg WEBSOCKET_HOST=${{ secrets.WEBSOCKET_HOST }}

      - name: Push image
        run: docker push teri1712/chat-app-client

      - name: Push production image
        run: docker push teri1712/chat-app-client-production

  google-cloud-deployment:
    needs: build-artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.GOOGLE_CLOUD_HOST }}
          username: ${{ secrets.GOOGLE_CLOUD_USER }}
          key: ${{ secrets.GOOGLE_CLOUD_SSH_KEY }}
          script: |
            docker stop chat-app-client || true
            docker pull teri1712/chat-app-client-production:latest
            docker run -d --name chat-app-client -p 4200:80 --restart unless-stopped teri1712/chat-app-client-production:latest