name: Angular Chat Application CD

on:
  pull_request:
    branches: [ master ]

jobs:
  check-build-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: set up node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: install dependencies
        run: npm ci

      - name: build
        run: npm run build
      - name: e2e test
        run: ng e2e --headless --watch false